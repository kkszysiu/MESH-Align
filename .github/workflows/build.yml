name: build

on:
  push:
  pull_request:

jobs:
  # Proves the geometry core builds & tests with NO GL / ImGui linkage.
  core-headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (core + tests only)
        run: cmake -S . -B build -DMA_BUILD_APP=OFF -DMA_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  app:
    name: app-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux GL/X11/Wayland deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules
      - uses: actions/setup-python@v5
        if: runner.os != 'macOS'    # glad code-gen runs Python (needs jinja2)
        with:
          python-version: '3.12'
      - name: Install glad codegen deps
        if: runner.os != 'macOS'
        run: python -m pip install jinja2
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel --config Release
      - name: Test
        run: ctest --test-dir build --output-on-failure --build-config Release
