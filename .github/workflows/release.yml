name: release

# Build installers/binaries when a version tag is pushed, then attach them to
# the GitHub Release for that tag — but only after every platform builds & tests.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true   # if one platform fails, don't publish a partial release
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            artifact: meshalign-linux-x64.tar.gz
          - os: windows-latest
            name: windows-x64
            artifact: meshalign-windows-x64.zip
          - os: macos-14            # Apple Silicon (arm64) runner
            name: macos-arm64
            artifact: meshalign-macos-arm64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GL/X11 deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DMA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --build-config Release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/app/meshalign dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          tar -czf "${{ matrix.artifact }}" -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/app/Release/meshalign.exe dist/
          if (Test-Path README.md) { Copy-Item README.md dist/ }
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.artifact }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build            # only runs if ALL build jobs succeeded
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to create the release / upload assets
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
